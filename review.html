<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Submitted | Success</title>
    <link rel="stylesheet" href="styles/form.css">
</head>

<body class="confirmation-page">
    <header>
        <h1>Submission Received</h1>
    </header>

    <main class="confirmation-card">
        <div class="success-icon">✔️</div>
        <h2>Thank You for Your Feedback!</h2>
        <p>Your review has been recorded. This helps us refine our music theory tools.</p>

        <div class="counter-box">
            <p>Total Reviews Completed:</p>
            <span id="review-count">0</span>
        </div>

        <a href="form.html" class="back-link">Submit Another Review</a>
    </main>

    <footer>
        <p>&copy; <span id="footer-year"></span> | Aaron | USA</p>
        <p>Last Modified: <span id="footer-mod"></span></p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Counter logic
            let count = Number(window.localStorage.getItem("reviewCount")) || 0;
            count++;
            window.localStorage.setItem("reviewCount", count);
            document.getElementById("review-count").textContent = count;

            // Footer logic
            document.getElementById("footer-year").textContent = new Date().getFullYear();
            document.getElementById("footer-mod").textContent = document.lastModified;
        });
    </script>
</body>

</html>
