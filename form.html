<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Aaron J Evan M. Tolentino">
    <meta name="description" content="Official feedback form for enterprise product assessment and quality control.">
    <title>Product Review System | Corporate Portal</title>

    <!-- Professional Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <div class="header-container">
            <h1 class="header-title">ENTERPRISE REVIEW FORM</h1>
            <p class="tagline">Standardized Quality Assessment System</p>
        </div>
    </header>

    <main class="container">
        <div class="form-card">
            <h2 class="section-title">Product Evaluation</h2>
            <p class="subtitle">Your feedback helps us refine our harmonic architecture.</p>

            <form id="reviewForm" method="get" action="review.html">
                <!-- Asset Selection -->
                <div class="form-group">
                    <label for="productName" class="required-label">Select Asset</label>
                    <select id="productName" name="productName" required>
                        <option value="" disabled selected>Select from active inventory...</option>
                    </select>
                </div>

                <!-- Rating Fieldset -->
                <fieldset class="form-group rating-fieldset">
                    <legend class="required-label">Performance Rating</legend>
                    <div class="rating-options">
                        <div class="rating-item">
                            <input type="radio" id="rating1" name="rating" value="1" required>
                            <label for="rating1">1 🤩 Poor</label>
                        </div>
                        <div class="rating-item">
                            <input type="radio" id="rating2" name="rating" value="2" required>
                            <label for="rating2">2 🤩 Fair</label>
                        </div>
                        <div class="rating-item">
                            <input type="radio" id="rating3" name="rating" value="3" required>
                            <label for="rating3">3 🤩 Average</label>
                        </div>
                        <div class="rating-item">
                            <input type="radio" id="rating4" name="rating" value="4" required>
                            <label for="rating4">4 🤩 Very Good</label>
                        </div>
                        <div class="rating-item">
                            <input type="radio" id="rating5" name="rating" value="5" required>
                            <label for="rating5">5 🤩 Excellent</label>
                        </div>
                    </div>
                </fieldset>

                <!-- Installation Date -->
                <div class="form-group">
                    <label for="installDate" class="required-label">Date of Deployment</label>
                    <input type="date" id="installDate" name="installDate" required>
                </div>

                <!-- Features Checklist -->
                <fieldset class="form-group features-fieldset">
                    <legend>Operational Strengths (Optional)</legend>
                    <div class="feature-grid">
                        <label><input type="checkbox" name="features" value="reliability"> Reliability</label>
                        <label><input type="checkbox" name="features" value="efficiency"> Efficiency</label>
                        <label><input type="checkbox" name="features" value="stability"> Stability</label>
                        <label><input type="checkbox" name="features" value="security"> Security</label>
                    </div>
                </fieldset>

                <!-- Review Text -->
                <div class="form-group">
                    <label for="writtenReview">Technical Observations</label>
                    <textarea id="writtenReview" name="writtenReview"
                        placeholder="Enter detailed performance metrics or observations..."></textarea>
                </div>

                <!-- User Name -->
                <div class="form-group">
                    <label for="userName">Assessor Name</label>
                    <input type="text" id="userName" name="userName" placeholder="Full name (optional)">
                </div>

                <button type="submit" class="submit-btn">SUBMIT OFFICIAL REPORT</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; <span id="currentyear"></span> Aaron J Evan M. Tolentino | USA</p>
            <p id="lastModified" class="mod-date"></p>
        </div>
    </footer>
</body>

</html>
