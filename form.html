<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Aaron">
    <meta name="description" content="Product Review Form for Music Tools">
    <title>Product Review Form | Aaron's Music Tools</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <form id="review-form" method="get" action="review.html">
            <!-- Product Select -->
            <div class="form-section">
                <label for="product">Product Name <span class="required">*</span></label>
                <select id="product" name="product" required>
                    <option value="" disabled selected>Select a Product ...</option>
                    <!-- Options populated by JS -->
                </select>
            </div>

            <!-- Overall Rating -->
            <fieldset>
                <legend>Overall Rating <span class="required">*</span></legend>
                <div class="rating-group">
                    <input type="radio" id="star5" name="rating" value="5" required><label for="star5">☆ 5</label>
                    <input type="radio" id="star4" name="rating" value="4" required><label for="star4">☆ 4</label>
                    <input type="radio" id="star3" name="rating" value="3" required><label for="star3">☆ 3</label>
                    <input type="radio" id="star2" name="rating" value="2" required><label for="star2">☆ 2</label>
                    <input type="radio" id="star1" name="rating" value="1" required><label for="star1">☆ 1</label>
                </div>
            </fieldset>

            <!-- Date of Installation -->
            <div class="form-section">
                <label for="install-date">Date of Installation <span class="required">*</span></label>
                <input type="date" id="install-date" name="install-date" required>
            </div>

            <!-- Useful Features -->
            <fieldset>
                <legend>Useful Features (Check all that apply)</legend>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="features" value="performance"> Performance</label>
                    <label><input type="checkbox" name="features" value="durability"> Durability</label>
                    <label><input type="checkbox" name="features" value="ease"> Ease of Use</label>
                    <label><input type="checkbox" name="features" value="design"> Design</label>
                </div>
            </fieldset>

            <!-- Written Review -->
            <div class="form-section">
                <label for="review">Written Review (Optional)</label>
                <textarea id="review" name="review" rows="4" placeholder="Tell us about your experience..."></textarea>
            </div>

            <!-- User Name -->
            <div class="form-section">
                <label for="user">Your Name (Optional)</label>
                <input type="text" id="user" name="user" placeholder="Enter your name">
            </div>

            <input type="submit" value="Post Review" class="submit-btn">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> | 🎹 Aaron J Evan M. Tolentino 🎹| Manila, Philippines</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>

</html>
